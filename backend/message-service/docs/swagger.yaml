basePath: /
definitions:
  models.Message:
    properties:
      content:
        type: string
      created_at:
        type: string
      group_id:
        type: integer
      id:
        type: integer
      sender:
        $ref: '#/definitions/models.User'
      sender_id:
        type: integer
    type: object
  models.User:
    properties:
      age:
        type: integer
      avatar_url:
        type: string
      bio:
        type: string
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: integer
      is_organizer:
        type: boolean
      last_name:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  services.SendMessageInput:
    properties:
      content:
        type: string
      group_id:
        type: integer
    required:
    - content
    - group_id
    type: object
host: localhost:8083
info:
  contact:
    email: support@example.com
    name: API Support
    url: http://www.example.com/support
  description: API for Message service in Meetup social networking application
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Message Service API
  version: "1.0"
paths:
  /messages:
    post:
      consumes:
      - application/json
      description: Send a message to an event group
      parameters:
      - description: Message data
        in: body
        name: message
        required: true
        schema:
          $ref: '#/definitions/services.SendMessageInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
      summary: Send a message
      tags:
      - Messages
  /messages/group/{group_id}:
    get:
      description: Get all messages for a specific event group
      parameters:
      - description: Group ID
        in: path
        name: group_id
        required: true
        type: integer
      - description: Results limit (default 50)
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Message'
            type: array
      summary: Get messages by group ID
      tags:
      - Messages
securityDefinitions:
  BearerAuth:
    description: Type "Bearer" followed by a space and JWT token.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
